name: Parse VTB CNY Rate

on:
  schedule:
    - cron: '*/30 7-16 * * *'
  workflow_dispatch:

jobs:
  parse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium

      - name: Run parser
        run: python parser.py

      - name: Push vtb_rate.json via API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CONTENT=$(base64 -w 0 vtb_rate.json)
          SHA=$(gh api repos/${{ github.repository }}/contents/vtb_rate.json --jq '.sha' 2>/dev/null || echo "")
          if [ -n "$SHA" ]; then
            gh api repos/${{ github.repository }}/contents/vtb_rate.json \
              --method PUT \
              --field message="update vtb_rate.json [skip ci]" \
              --field content="$CONTENT" \
              --field sha="$SHA" \
              --field branch="main"
          else
            gh api repos/${{ github.repository }}/contents/vtb_rate.json \
              --method PUT \
              --field message="update vtb_rate.json [skip ci]" \
              --field content="$CONTENT" \
              --field branch="main"
          fi
